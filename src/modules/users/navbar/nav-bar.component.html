<nav class="bg-[#0d0f17]/80 border-b border-white/5 backdrop-blur-2xl sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <!-- Logo -->
      <div class="flex items-center gap-3 shrink-0 group cursor-pointer">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
          </svg>
        </div>
        <h2 class="text-white font-bold tracking-tight group-hover:text-indigo-400 transition-colors">Library</h2>
      </div>

      <!-- Desktop Nav -->
      <div class="hidden md:flex items-center gap-1 bg-white/5 rounded-2xl p-1.5 border border-white/5">
        @for (item of navItems; track item.link) {
          <a

            [routerLink]="item.link"
            routerLinkActive="active bg-indigo-600 text-white shadow-lg shadow-indigo-500/20"
            [routerLinkActiveOptions]="{ exact: true }"
            class="group flex items-center gap-2.5 px-5 py-2 rounded-xl text-slate-400 hover:text-slate-100 hover:bg-white/5 transition-all duration-200 text-sm font-semibold"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0 group-hover:scale-110 transition-transform duration-200">
              <path [attr.d]="item.svg" />
            </svg>
            <span>{{ item.label }}</span>
          </a>
        }
      </div>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <button aria-label="Notifications" type="button" class="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 text-slate-400 hover:text-white transition-all relative">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="absolute top-2.5 right-2.5 w-2 h-2 bg-indigo-500 rounded-full ring-2 ring-[#0d0f17]"></span>
        </button>

        <div class="h-8 w-[1px] bg-white/10 mx-1"></div>

        <button aria-label="User Menu" type="button" class="flex items-center gap-2 pl-2 pr-4 py-1.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-all group">
          <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-xs font-bold text-white uppercase">SK</div>
          <span class="hidden sm:block text-sm font-medium text-slate-200 group-hover:text-white">Sarah Kim</span>
        </button>
      </div>

    </div>
  </div>
</nav>
