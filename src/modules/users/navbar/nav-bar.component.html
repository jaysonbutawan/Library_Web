 <nav class="bg-white/2 border-b border-white/10 backdrop-blur-xl sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-6 md:px-10 lg:px-14">
        <!-- Main Navigation Container -->
        <div class="flex items-center justify-between h-20">

          <!-- Logo/Brand -->
          <div class="flex items-center gap-3 shrink-0">
            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H3m0-12v6h18v-6M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5" />
              </svg>
            </div>
            <div class="hidden sm:block">
              <h1 class="text-lg font-bold text-white tracking-tight">Library Hub</h1>
              <p class="text-xs text-slate-400">Manage Your Collection</p>
            </div>
          </div>

          <!-- Navigation Tabs -->
          <div class="hidden md:flex items-center gap-1 bg-white/3 rounded-xl p-1.5 border border-white/10">
            <a
              routerLink="/student/books"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 whitespace-nowrap"
              [ngClass]="{
                'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30': isTabActive('books'),
                'text-slate-400 hover:text-white': !isTabActive('books')
              }"
            >
              <span class="flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                  <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                </svg>
                Browse Books
              </span>
            </a>

            <a
              routerLink="/student/borrowed"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 whitespace-nowrap"
              [ngClass]="{
                'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30': isTabActive('borrowed'),
                'text-slate-400 hover:text-white': !isTabActive('borrowed')
              }"
            >
              <span class="flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="9" cy="21" r="1" />
                  <circle cx="20" cy="21" r="1" />
                  <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
                My Borrowed Books
              </span>
            </a>

            <a
              routerLink="/student/history"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-200 whitespace-nowrap"
              [ngClass]="{
                'bg-indigo-600 text-white shadow-lg shadow-indigo-500/30': isTabActive('history'),
                'text-slate-400 hover:text-white': !isTabActive('history')
              }"
            >
              <span class="flex items-center gap-2">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10" />
                  <polyline points="12 6 12 12 16 14" />
                </svg>
                Borrowing History
              </span>
            </a>
          </div>

          <!-- Right Side Actions -->
          <div class="flex items-center gap-3 ml-auto">
            <!-- Notifications Badge -->
            <button
              type="button"
              aria-label="notifications"
              class="relative p-2.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 transition-all text-slate-400 hover:text-white"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
              <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
            </button>

            <!-- User Profile -->
            <button
              type="button"
              aria-label="user profile"
              class="flex items-center gap-3 px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 hover:border-white/20 transition-all"
            >
              <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center text-sm font-bold text-white">
                SK
              </div>
              <span class="hidden sm:block text-sm font-medium text-white">Sarah Kim</span>
            </button>
          </div>
        </div>

        <!-- Mobile Tabs (Hidden on larger screens) -->
        <div class="md:hidden flex items-center gap-2 pb-3 overflow-x-auto scrollbar-hide">
          <a
            routerLink="/student/books"
            routerLinkActive="active"
            class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap"
            [ngClass]="{
              'bg-indigo-600 text-white': isTabActive('books'),
              'bg-white/5 text-slate-400': !isTabActive('books')
            }"
          >
            Browse
          </a>
          <a
            routerLink="/student/borrowed"
            routerLinkActive="active"
            class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap"
            [ngClass]="{
              'bg-indigo-600 text-white': isTabActive('borrowed'),
              'bg-white/5 text-slate-400': !isTabActive('borrowed')
            }"
          >
            Borrowed
          </a>
          <a
            routerLink="/student/history"
            routerLinkActive="active"
            class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all whitespace-nowrap"
            [ngClass]="{
              'bg-indigo-600 text-white': isTabActive('history'),
              'bg-white/5 text-slate-400': !isTabActive('history')
            }"
          >
            History
          </a>
        </div>
      </div>
    </nav>
