<aside class="w-full h-full bg-[#0d0f17] border-r border-white/5 flex flex-col p-5 overflow-y-auto">

  <!-- Logo -->
  <div class="flex items-center space-x-3 mb-10 group cursor-pointer">
    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/30 group-hover:scale-110 transition-transform duration-300">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
    </div>
    <div>
      <h2 class="text-white font-bold leading-tight tracking-tight group-hover:text-indigo-400 transition-colors">The Vault</h2>
      <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Security Suite</p>
    </div>
  </div>

  <!-- Section Label -->
  <p class="text-[10px] font-bold text-slate-600 uppercase tracking-[0.2em] px-4 mb-3">Main Menu</p>

  <!-- Nav -->
  <nav class="grow space-y-1">
    <ng-container *ngTemplateOutlet="navItem; context: { link: '/dashboard', label: 'Dashboard', svg: 'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z' }"></ng-container>
    <ng-container *ngTemplateOutlet="navItem; context: { link: '/admin/circulation', label: 'Circulation', svg: 'M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15' }"></ng-container>
    <ng-container *ngTemplateOutlet="navItem; context: { link: '/admin/inventory', label: 'Inventory', svg: 'M4 19.5A2.5 2.5 0 0 1 6.5 17H20M4 19.5A2.5 2.5 0 0 0 6.5 22H20V2H6.5A2.5 2.5 0 0 0 4 4.5v15z' }"></ng-container>
    <ng-container *ngTemplateOutlet="navItem; context: { link: '/admin/students', label: 'Students', svg: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75' }"></ng-container>
    <ng-container *ngTemplateOutlet="navItem; context: { link: '/clearance', label: 'Clearance', svg: 'M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4 12 14.01l-3-3' }"></ng-container>
    <ng-container *ngTemplateOutlet="navItem; context: { link: '/staff', label: 'Staff', svg: 'M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2zM16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16' }"></ng-container>
  </nav>

  <!-- Bottom -->
  <div class="mt-auto pt-5 border-t border-white/5 space-y-1">
    <a routerLink="/security-logs" routerLinkActive="bg-white/5 text-slate-200"
       class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-slate-100 hover:bg-white/5 transition-all duration-200 text-sm font-medium group">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:scale-110 transition-transform">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span>Security Logs</span>
    </a>

    <button class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-red-400 hover:bg-red-500/5 transition-all duration-200 text-sm font-medium w-full text-left group">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:scale-110 transition-transform">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
      <span>Sign Out</span>
    </button>
  </div>

</aside>

<ng-template #navItem let-link="link" let-label="label" let-svg="svg">
  <a [routerLink]="link"
     routerLinkActive="active bg-indigo-600/15 text-white border-indigo-500/30"
     [routerLinkActiveOptions]="{ exact: true }"
     class="group flex items-center justify-between px-4 py-3 rounded-xl text-slate-400 border border-transparent hover:bg-white/5 hover:text-slate-100 transition-all duration-200">
    <div class="flex items-center gap-3">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           class="flex-shrink-0 group-hover:scale-110 transition-transform duration-200">
        <path [attr.d]="svg"/>
      </svg>
      <span class="text-sm font-medium tracking-wide">{{ label }}</span>
    </div>
    <!-- Active dot indicator -->
    <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 opacity-0 group-[.active]:opacity-100 transition-opacity duration-200"></span>
  </a>
</ng-template>
