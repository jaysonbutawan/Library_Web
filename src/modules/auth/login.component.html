<div class="min-h-screen bg-[#0b0e14] bg-linear-to-br from-[#0b0e14] via-[#1a1333] to-[#0b0e14] flex items-center justify-center p-6 font-sans text-white">
  
  <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
    
    <div class="space-y-8">
      <div class="inline-flex items-center px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] font-bold tracking-widest uppercase text-indigo-400">
        <span class="w-2 h-2 rounded-full bg-indigo-500 mr-2"></span>
        Secure Infrastructure
      </div>

      <h1 class="text-6xl font-bold tracking-tight">
        Welcome back<span class="text-indigo-500">.</span>
      </h1>

      <p class="text-slate-400 text-lg max-w-md leading-relaxed">
        Access your encrypted digital assets with enterprise-grade security protocols.
      </p>

      <div class="flex items-center space-x-4 pt-4">
        <div class="flex -space-x-3">
          <div class="w-10 h-10 rounded-full border-2 border-[#0b0e14] bg-slate-800 flex items-center justify-center text-[10px] font-bold">JS</div>
          <div class="w-10 h-10 rounded-full border-2 border-[#0b0e14] bg-slate-700 flex items-center justify-center text-[10px] font-bold">RK</div>
          <div class="w-10 h-10 rounded-full border-2 border-[#0b0e14] bg-slate-600 flex items-center justify-center text-[10px] font-bold">ML</div>
        </div>
        <p class="text-sm text-slate-500 font-medium">Trusted by 25,000+ teams globally</p>
      </div>
    </div>

    <div class="relative">
      <div class="absolute -top-6 -right-6 w-12 h-12 bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl flex items-center justify-center shadow-2xl z-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>

      <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-4xl p-10 shadow-2xl">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Email Address</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
              </span>
              <input type="email" formControlName="email" placeholder="name@company.com" 
                class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600">
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
              </span>
              <input type="password" formControlName="password" placeholder="••••••••" 
                class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all">
            </div>
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center space-x-2 cursor-pointer">
              <input type="checkbox" formControlName="remember" class="w-4 h-4 rounded border-white/10 bg-white/5 accent-indigo-500">
              <span class="text-xs text-slate-400">Remember Me</span>
            </label>
            <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium">Forgot Password?</a>
          </div>

          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl flex items-center justify-center space-x-2 transition-all shadow-lg shadow-indigo-600/20 active:scale-[0.98]">
            <span>Sign In</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
          </button>

          <div class="relative py-4 flex items-center">
            <div class="grow border-t border-white/10"></div>
            <span class="shrink mx-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest">Secure Gateway</span>
            <div class="grow border-t border-white/10"></div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <button type="button" class="flex items-center justify-center space-x-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-xs font-medium">
              <span>Google</span>
            </button>
            <button type="button" class="flex items-center justify-center space-x-2 py-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-xs font-medium">
              <span>Apple</span>
            </button>
          </div>

          <p class="text-center text-xs text-slate-500 pt-4">
            Don't have an account? <a href="#" class="text-indigo-400 font-bold hover:underline">Sign Up</a>
          </p>
        </form>
      </div>
    </div>
  </div>

  <div class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-white/5 backdrop-blur-md border border-white/10 px-6 py-3 rounded-2xl flex items-center space-x-4">
    <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
    </div>
    <div>
      <p class="text-[10px] font-bold uppercase tracking-widest leading-none">Enterprise Encryption</p>
      <p class="text-[10px] text-slate-500 italic">256-bit SSL secured tunnel active.</p>
    </div>
  </div>

</div>
