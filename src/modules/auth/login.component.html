<div
  class="min-h-screen bg-[#0b0e14] bg-linear-to-br from-[#0b0e14] via-[#1a1333] to-[#0b0e14] flex items-center justify-center p-6 font-sans text-white"
>
  <div class="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
    <div class="space-y-8 -ml-16 ">
      <div
        class="inline-flex items-center whitespace-nowrap  px-7 py-4 rounded-full bg-white/5 border border-white/10 text-2xl font-bold tracking-widest uppercase text-indigo-400"
      >
        <span class="w-4 h-4 rounded-full bg-indigo-500 mr-3"></span>
        Secure Library Management System
      </div>

      <h1 class="text-6xl font-bold tracking-tight">
        Welcome back<span class="text-indigo-500">.</span>
      </h1>

      <p class="text-slate-400 text-lg max-w-md leading-relaxed">
        Access your encrypted digital assets with enterprise-grade security protocols.
      </p>

      <div class="flex items-center space-x-4 pt-4">
        <div class="flex -space-x-3">
          <div
            class="w-10 h-10 rounded-full border-2 border-[#0b0e14] bg-slate-800 flex items-center justify-center text-[10px] font-bold"
          >
            JS
          </div>
          <div
            class="w-10 h-10 rounded-full border-2 border-[#0b0e14] bg-slate-700 flex items-center justify-center text-[10px] font-bold"
          >
            RK
          </div>
          <div
            class="w-10 h-10 rounded-full border-2 border-[#0b0e14] bg-slate-600 flex items-center justify-center text-[10px] font-bold"
          >
            ML
          </div>
        </div>
        <p class="text-sm text-slate-500 font-medium">Trusted by 25,000+ teams globally</p>
      </div>
    </div>

    <div class="relative">
      <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-4xl p-10 shadow-2xl">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3"
              >Email Address</label
            >
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                  />
                </svg>
              </span>
              <input
                type="email"
                formControlName="email"
                placeholder="name@company.com"
                class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all placeholder:text-slate-600"
              />
            </div>
          </div>

          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3"
              >Password</label
            >
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                  />
                </svg>
              </span>
              <input
                type="password"
                formControlName="password"
                placeholder="••••••••"
                class="w-full bg-white/5 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all"
              />
            </div>
          </div>

          <div class="flex items-center justify-between">
            <label class="flex items-center space-x-2 cursor-pointer">
              <input
                type="checkbox"
                formControlName="remember"
                class="w-4 h-4 rounded border-white/10 bg-white/5 accent-indigo-500"
              />
              <span class="text-xs text-slate-400">Remember Me</span>
            </label>
          </div>

          <div
            *ngIf="errorMessage"
            class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl flex items-center gap-3 animate-in fade-in slide-in-from-top-2"
          >
            <i class="pi pi-exclamation-circle text-red-500"></i>
            <span class="text-xs font-bold text-red-500">{{ errorMessage }}</span>
          </div>

          <button
            type="submit"
            [disabled]="isLoading || loginForm.invalid"
            class="w-full relative group overflow-hidden bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-800 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl flex items-center justify-center space-x-2 transition-all shadow-lg shadow-indigo-600/20 active:scale-[0.98]"
          >
            <ng-container *ngIf="!isLoading">
              <span>Sign In</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5 group-hover:translate-x-1 transition-transform"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14 5l7 7m0 0l-7 7m7-7H3"
                />
              </svg>
            </ng-container>

            <ng-container *ngIf="isLoading">
              <i class="pi pi-spin pi-spinner text-xl mr-2"></i>
              <span class="tracking-widest uppercase text-[10px]">Authenticating...</span>
            </ng-container>

            <div
              *ngIf="isLoading"
              class="absolute bottom-0 left-0 h-1 bg-indigo-400 animate-progress-bar"
            ></div>
          </button>

          <div class="relative py-4 flex items-center">
            <div class="grow border-t border-white/10"></div>
            <span class="shrink mx-4 text-[10px] font-bold text-slate-500 uppercase tracking-widest"
              >Secure Gateway</span
            >
            <div class="grow border-t border-white/10"></div>
          </div>

          <p class="text-center text-xs text-slate-500 pt-4">
            Don't have an account?
            <a class="text-indigo-400 font-bold hover:underline"
              >PLease approach the Registrar Office</a
            >
          </p>
        </form>
      </div>
    </div>
  </div>
</div>
